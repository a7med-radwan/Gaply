services:
  - type: web
    name: gaply
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: gaply-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gaply-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: gaply-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gaply-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gaply-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
    # Automatically runs migrations in a temporary container before deploying
    releaseCommand: php artisan migrate --force

databases:
  - name: gaply-db
    plan: free
